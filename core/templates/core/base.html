{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}OptiMeta{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Neon Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'home' %}" class="logo">OptiMeta</a>

        <div class="nav-links">
            <a href="{% url 'home' %}"
               class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
               Optimize
            </a>

            <a href="{% url 'meta_viewer' %}"
               class="{% if request.resolver_match.url_name == 'meta_viewer' %}active{% endif %}">
               View Metadata
            </a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="{% static 'core/js/main.js' %}"></script>
</body>
</html>
